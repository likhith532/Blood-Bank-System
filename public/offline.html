<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Blood Bank Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .offline-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 550px;
        }

        .offline-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .offline-icon i {
            font-size: 4rem;
            color: white;
        }

        .offline-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .offline-message {
            color: #6b7280;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 35px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .offline-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        .btn-offline {
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary-offline {
            background: linear-gradient(135deg, #ea580c 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(234, 88, 12, 0.4);
        }

        .btn-primary-offline:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(234, 88, 12, 0.5);
        }

        .btn-primary-offline:active {
            transform: translateY(-1px);
        }

        .btn-secondary-offline {
            background: white;
            color: #374151;
            border: 2px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .btn-secondary-offline:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            transform: translateY(-2px);
        }

        .connection-status {
            margin-top: 30px;
            padding: 18px 24px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .status-checking {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #fbbf24;
            color: #92400e;
        }

        .status-success {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 2px solid #10b981;
            color: #065f46;
        }

        .status-error {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid #ef4444;
            color: #991b1b;
        }

        .retry-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulseIndicator 2s infinite;
        }

        @keyframes pulseIndicator {
            0% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.5;
                transform: scale(1.2);
            }
            100% { 
                opacity: 1;
                transform: scale(1);
            }
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e5e7eb;
        }

        .feature-item {
            padding: 15px;
            background: #f9fafb;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: #f3f4f6;
            transform: translateY(-2px);
        }

        .feature-item i {
            font-size: 1.5rem;
            color: #667eea;
            margin-bottom: 8px;
        }

        .feature-item p {
            font-size: 0.85rem;
            color: #6b7280;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .offline-card {
                padding: 40px 25px;
            }

            .offline-title {
                font-size: 2rem;
            }

            .offline-message {
                font-size: 1rem;
            }

            .btn-offline {
                padding: 12px 24px;
                font-size: 0.95rem;
            }

            .offline-icon {
                width: 100px;
                height: 100px;
            }

            .offline-icon i {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-card">
            <div class="offline-icon">
                <i class="fas fa-wifi-slash"></i>
            </div>
            
            <h1 class="offline-title">You're Offline</h1>
            
            <p class="offline-message">
                It looks like you've lost your internet connection. Don't worry - your data is safe 
                and will be synchronized when you're back online.
            </p>
            
            <div class="offline-actions">
                <button class="btn-offline btn-primary-offline" onclick="retryConnection()">
                    <i class="fas fa-redo"></i> Try Again
                </button>
                <button class="btn-offline btn-secondary-offline" onclick="goHome()">
                    <i class="fas fa-home"></i> Go Home
                </button>
            </div>
            
            <div class="connection-status status-checking" id="connectionStatus">
                <span class="retry-indicator"></span>
                Checking connection...
            </div>

            <div class="feature-grid">
                <div class="feature-item">
                    <i class="fas fa-shield-alt"></i>
                    <p>Data Safe</p>
                </div>
                <div class="feature-item">
                    <i class="fas fa-sync"></i>
                    <p>Auto Sync</p>
                </div>
                <div class="feature-item">
                    <i class="fas fa-save"></i>
                    <p>Auto Save</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let retryCount = 0;
        const maxRetries = 10;

        function retryConnection() {
            retryCount++;
            updateStatus('Checking connection...', 'checking');

            fetch('/api/inventory')
                .then(response => {
                    if (response.ok) {
                        updateStatus('Connection restored! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 2000);
                    } else {
                        throw new Error('Server error');
                    }
                })
                .catch(error => {
                    if (retryCount < maxRetries) {
                        updateStatus(`Connection failed. Retry ${retryCount}/${maxRetries}`, 'error');
                    } else {
                        updateStatus('Unable to connect. Please check your internet connection.', 'error');
                    }
                });
        }

        function updateStatus(message, type) {
            const statusElement = document.getElementById('connectionStatus');
            statusElement.innerHTML = `<span class="retry-indicator"></span>${message}`;
            
            // Remove all status classes
            statusElement.className = 'connection-status';
            
            // Add appropriate status class
            if (type === 'checking') {
                statusElement.classList.add('status-checking');
                statusElement.querySelector('.retry-indicator').style.background = '#f59e0b';
            } else if (type === 'success') {
                statusElement.classList.add('status-success');
                statusElement.querySelector('.retry-indicator').style.background = '#10b981';
            } else if (type === 'error') {
                statusElement.classList.add('status-error');
                statusElement.querySelector('.retry-indicator').style.background = '#ef4444';
            }
        }

        function goHome() {
            window.location.href = '/';
        }

        // Auto-retry every 5 seconds
        const autoRetryInterval = setInterval(() => {
            if (retryCount < maxRetries) {
                retryConnection();
            } else {
                clearInterval(autoRetryInterval);
            }
        }, 5000);

        // Initial retry after 1 second
        setTimeout(retryConnection, 1000);

        // Listen for online event
        window.addEventListener('online', () => {
            updateStatus('Connection detected! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        });

        // Listen for offline event
        window.addEventListener('offline', () => {
            updateStatus('Connection lost...', 'error');
        });
    </script>
</body>
</html>
